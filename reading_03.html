<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的閱讀時光紀錄</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; min-height: 100vh; font-family: sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8 text-center sm:text-left">

    <script>
        const SUPABASE_URL = 'https://nzsjauiixrzfpkamwlfr.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_37I7ZAUEw3W4YzruD71MtQ_JCeyPnrs';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 flex flex-col sm:flex-row justify-between items-center sm:items-end gap-4">
            <div class="text-center sm:text-left">
                <h1 class="text-3xl font-bold text-blue-400 tracking-tight">閱讀紀錄器</h1>
                <p class="text-slate-400">專注於每一頁的感動</p>
            </div>
            <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700 min-w-[150px]">
                <p class="text-xs text-slate-400 uppercase tracking-widest">累積總閱讀時數</p>
                <p class="text-3xl font-mono text-blue-400" id="overall-hours">0.0h</p>
            </div>
        </header>

        <section class="glass-card p-6 rounded-3xl mb-8 shadow-2xl">
            <h2 class="text-lg font-semibold mb-4 text-blue-300">新增書籍</h2>
            <div class="flex flex-col sm:flex-row gap-2">
                <input type="text" id="book-search-input" placeholder="輸入書名搜尋封面..." 
                    class="flex-1 bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 text-white transition-all">
                <button onclick="searchBook()" id="search-btn" class="bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-xl transition font-bold shadow-lg shadow-blue-900/20">搜尋</button>
            </div>
            <div id="search-results" class="mt-6 grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </section>

        <h2 class="text-xl font-bold mb-6 flex items-center justify-center sm:justify-start gap-2">
            <span class="w-2 h-6 bg-blue-500 rounded-full"></span>
            我的書架
        </h2>
        <div id="book-shelf" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <p class="text-slate-500 italic">正在載入書架...</p>
        </div>
    </div>

    <!-- 詳情彈窗 -->
    <div id="book-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="glass-card w-full max-w-2xl max-h-[90vh] overflow-y-auto p-8 rounded-3xl relative custom-scrollbar shadow-2xl">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white text-4xl transition">&times;</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        let activeTimer = null;
        let startTime = null;

        async function searchBook() {
            const input = document.getElementById('book-search-input');
            const resultsDiv = document.getElementById('search-results');
            const searchBtn = document.getElementById('search-btn');
            if (!input.value) return;

            searchBtn.innerText = '搜尋中...';
            resultsDiv.innerHTML = '';

            try {
                const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(input.value)}`);
                const data = await response.json();
                
                if (!data.items || data.items.length === 0) {
                    resultsDiv.innerHTML = `
                        <div class="col-span-full text-center p-4">
                            <p class="text-slate-400 mb-2">找不到封面？沒關係，你可以直接新增：</p>
                            <button onclick="addBook('${input.value}', 'https://via.placeholder.com/300x450?text=${encodeURIComponent(input.value)}')" 
                                class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-sm transition">
                                直接手動新增「${input.value}」
                            </button>
                        </div>`;
                    return;
                }

                data.items.slice(0, 4).forEach(item => {
                    const info = item.volumeInfo;
                    const cover = info.imageLinks?.thumbnail?.replace('http:', 'https:') || `https://via.placeholder.com/128x192?text=${encodeURIComponent(info.title)}`;
                    const div = document.createElement('div');
                    div.className = 'bg-slate-800/50 p-3 rounded-2xl text-center border border-slate-700 hover:border-blue-500/50 transition';
                    div.innerHTML = `
                        <img src="${cover}" class="w-full rounded-xl shadow-md mb-3 h-32 object-cover mx-auto">
                        <p class="text-[10px] truncate mb-3 text-slate-300 px-1">${info.title}</p>
                        <button onclick="addBook('${info.title.replace(/'/g, "\\'")}', '${cover}')" class="text-xs bg-blue-600 hover:bg-blue-500 w-full py-2 rounded-lg transition font-bold">加入書架</button>
                    `;
                    resultsDiv.appendChild(div);
                });
            } catch (err) {
                resultsDiv.innerHTML = `<button onclick="addBook('${input.value}', 'https://via.placeholder.com/300x450?text=Error')" class="bg-red-900/20 text-red-400 border border-red-900/50 p-4 rounded-xl w-full">連線失敗，點此強制新增「${input.value}」</button>`;
            } finally {
                searchBtn.innerText = '搜尋';
            }
        }

        async function addBook(title, cover) {
            const { error } = await _supabase.from('books').insert([{ title, cover_url: cover }]);
            if (error) alert('儲存失敗');
            else {
                document.getElementById('search-results').innerHTML = '';
                document.getElementById('book-search-input').value = '';
                loadBooks();
            }
        }

        async function loadBooks() {
            const { data: books, error: e1 } = await _supabase.from('books').select('*').order('created_at', { ascending: false });
            const { data: sessions, error: e2 } = await _supabase.from('reading_sessions').select('*');
            if (e1 || e2) return;

            const shelf = document.getElementById('book-shelf');
            shelf.innerHTML = books.length === 0 ? '<p class="text-slate-500 italic py-10">目前還沒有書籍，請從上方搜尋並新增...</p>' : '';

            books.forEach(book => {
                const bookSessions = sessions.filter(s => s.book_id === book.id);
                const totalSeconds = bookSessions.reduce((sum, s) => sum + (s.duration_seconds || 0), 0);
                const hours = (totalSeconds / 3600).toFixed(1);

                const card = document.createElement('div');
                card.className = 'glass-card p-5 rounded-3xl flex gap-5 cursor-pointer hover:bg-slate-800/80 transition-all transform hover:-translate-y-1 shadow-xl group';
                card.onclick = () => showBookDetail(book.id);
                card.innerHTML = `
                    <div class="relative overflow-hidden rounded-xl shadow-lg w-20 h-28">
                        <img src="${book.cover_url}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                    </div>
                    <div class="flex-1 flex flex-col justify-center">
                        <h3 class="font-bold text-lg mb-1 text-blue-100 group-hover:text-blue-400 transition">${book.title}</h3>
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                            <p class="text-blue-400 font-mono text-sm font-bold tracking-wider">${hours}h <span class="text-[10px] text-slate-500">累積時數</span></p>
                        </div>
                    </div>
                `;
                shelf.appendChild(card);
            });
            const overall = sessions.reduce((sum, s) => sum + (s.duration_seconds || 0), 0);
            document.getElementById('overall-hours').innerText = (overall / 3600).toFixed(1) + 'h';
        }

        async function showBookDetail(bookId) {
            const { data: book } = await _supabase.from('books').select('*').eq('id', bookId).single();
            const { data: sessions } = await _supabase.from('reading_sessions').eq('book_id', bookId).order('created_at', {ascending: false});
            const { data: completions } = await _supabase.from('book_completions').eq('book_id', bookId);
            document.getElementById('book-modal').classList.remove('hidden');
            const totalSec = sessions.reduce((sum, s) => sum + (s.duration_seconds || 0), 0);

            document.getElementById('modal-content').innerHTML = `
                <div class="flex flex-col md:flex-row gap-10">
                    <div class="w-full md:w-2/5 flex flex-col items-center">
                        <img src="${book.cover_url}" class="w-48 h-64 rounded-2xl shadow-2xl mb-6 object-cover border border-slate-700">
                        <div class="grid grid-cols-2 gap-4 w-full">
                            <div class="bg-slate-900/80 p-4 rounded-2xl text-center border border-slate-800">
                                <p class="text-[10px] text-slate-500 uppercase font-bold">總時數</p>
                                <p class="text-2xl font-mono text-blue-400">${(totalSec/3600).toFixed(1)}h</p>
                            </div>
                            <div class="bg-slate-900/80 p-4 rounded-2xl text-center border border-slate-800">
                                <p class="text-[10px] text-slate-500 uppercase font-bold">完讀</p>
                                <p class="text-2xl font-mono text-green-400">${completions.length}</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex-1 text-left">
                        <h2 class="text-3xl font-bold mb-8 text-white">${book.title}</h2>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-10">
                            <button id="timer-btn" onclick="toggleTimer('${book.id}')" class="bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-bold transition text-xl shadow-lg shadow-blue-900/30">開始閱讀</button>
                            <button onclick="markComplete('${book.id}')" class="bg-emerald-700 hover:bg-emerald-600 py-5 rounded-2xl font-bold transition text-xl shadow-lg shadow-emerald-900/30">標記讀完</button>
                        </div>
                        <h4 class="text-xs font-bold text-slate-500 uppercase mb-4 border-b border-slate-800 pb-2 tracking-widest">閱讀歷程</h4>
                        <div class="space-y-3 max-h-60 overflow-y-auto pr-2 custom-scrollbar">
                            ${sessions.length === 0 ? '<p class="text-slate-600 italic">尚無紀錄</p>' : ''}
                            ${sessions.map(s => `<div class="flex justify-between items-center bg-slate-900/50 p-4 rounded-xl border border-slate-800"><span class="text-slate-300 text-sm">${new Date(s.start_time).toLocaleDateString()}</span><span class="font-mono text-blue-300 bg-blue-900/30 px-3 py-1 rounded-full text-xs">${Math.floor(s.duration_seconds/60)}m ${s.duration_seconds%60}s</span></div>`).join('')}
                        </div>
                    </div>
                </div>`;
        }

        async function toggleTimer(bookId) {
            const btn = document.getElementById('timer-btn');
            if (!activeTimer) {
                startTime = new Date();
                btn.classList.replace('bg-blue-600', 'bg-red-600');
                activeTimer = setInterval(() => {
                    const d = Math.floor((new Date() - startTime) / 1000);
                    btn.innerText = `停止 (${Math.floor(d/60)}m ${d%60}s)`;
                }, 1000);
            } else {
                const dur = Math.floor((new Date() - startTime) / 1000);
                clearInterval(activeTimer); activeTimer = null;
                btn.innerText = '儲存中...';
                await _supabase.from('reading_sessions').insert([{book_id: bookId, start_time: startTime.toISOString(), end_time: new Date().toISOString(), duration_seconds: dur}]);
                showBookDetail(bookId); loadBooks();
            }
        }

        async function markComplete(bookId) {
            if(confirm('確認標記讀完？')) { await _supabase.from('book_completions').insert([{ book_id: bookId }]); showBookDetail(bookId); }
        }

        function closeModal() { document.getElementById('book-modal').classList.add('hidden'); }
        loadBooks();
    </script>
</body>
</html>
