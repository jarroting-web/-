<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>閱讀紀錄器</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="閱讀紀錄">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3389/3389081.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        body { 
            background-color: #0f172a; 
            color: #f1f5f9; 
            min-height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding-top: calc(var(--safe-top) + 20px);
            padding-bottom: calc(var(--safe-bottom) + 20px);
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .active-tab { border-bottom: 3px solid #60a5fa; color: #60a5fa; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        button:active { transform: scale(0.96); transition: 0.1s; }
        
        .complete-badge {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="max-w-xl mx-auto px-4">
        <!-- 頂部切換 -->
        <nav class="flex justify-center gap-12 mb-8 text-sm font-bold uppercase tracking-widest text-slate-500 border-b border-slate-800">
            <button id="btn-shelf" class="pb-3 active-tab">我的書架</button>
            <button id="btn-stats" class="pb-3">年度統計</button>
        </nav>

        <div id="page-shelf">
            <header class="mb-8 flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold text-blue-400">閱讀紀錄</h1>
                    <p class="text-xs text-slate-400">每一分鐘都有價值</p>
                </div>
                <div class="bg-slate-800/50 p-3 rounded-2xl border border-slate-700 text-right min-w-[100px]">
                    <p class="text-[9px] text-slate-500 uppercase font-bold tracking-tighter">本月閱讀</p>
                    <p class="text-lg font-mono text-blue-400" id="monthly-total">0m</p>
                </div>
            </header>

            <!-- 智慧搜尋與新增區 -->
            <section class="glass-card p-5 rounded-3xl mb-8 shadow-xl">
                <input type="text" id="book-name-input" placeholder="搜尋或輸入新書名..." 
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 mb-3 outline-none text-white focus:border-blue-500 text-base">
                <div class="flex gap-2">
                    <button id="search-btn" class="flex-1 bg-slate-700 hover:bg-slate-600 py-3 rounded-xl font-bold transition">搜尋</button>
                    <button id="add-book-btn" class="flex-1 bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition">新增書籍</button>
                </div>
            </section>

            <!-- 書架 -->
            <div id="book-shelf" class="space-y-4">
                <p class="text-slate-500 italic py-10 text-center text-sm">載入中...</p>
            </div>
        </div>

        <div id="page-stats" class="hidden">
            <h2 class="text-xl font-bold mb-6 text-blue-400">閱讀大數據統計</h2>
            <div id="stats-container" class="space-y-4"></div>
        </div>
    </div>

    <!-- 詳情彈窗 -->
    <div id="book-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
        <div class="glass-card w-full max-w-lg max-h-[85vh] overflow-y-auto p-6 rounded-[2.5rem] relative custom-scrollbar">
            <button id="close-modal-btn" class="absolute top-4 right-4 text-slate-500 text-4xl">&times;</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        (function() {
            const SUPABASE_URL = 'https://nzsjauiixrzfpkamwlfr.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_37I7ZAUEw3W4YzruD71MtQ_JCeyPnrs';
            let _supabase, activeTimer, startTime;
            let allBooks = []; // 存儲所有書籍數據
            let allSessions = [];
            let allCompletions = [];

            function formatTime(totalSec) {
                if (totalSec <= 0) return "0 分鐘";
                if (totalSec < 60) return `${totalSec} 秒`;
                const h = Math.floor(totalSec / 3600);
                const m = Math.floor((totalSec % 3600) / 60);
                return h > 0 ? (m > 0 ? `${h}時 ${m}分` : `${h}時`) : `${m}分鐘`;
            }

            async function init() {
                _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                document.getElementById('search-btn').onclick = () => renderShelf(document.getElementById('book-name-input').value.trim());
                document.getElementById('add-book-btn').onclick = addBook;
                document.getElementById('btn-shelf').onclick = () => switchTab('shelf');
                document.getElementById('btn-stats').onclick = () => switchTab('stats');
                document.getElementById('close-modal-btn').onclick = closeModal;
                
                // 監聽輸入框，打字時按下 Enter 直接搜尋
                document.getElementById('book-name-input').onkeypress = (e) => {
                    if (e.key === 'Enter') renderShelf(e.target.value.trim());
                };

                await fetchData();
            }

            function switchTab(tab) {
                document.getElementById('page-shelf').classList.toggle('hidden', tab !== 'shelf');
                document.getElementById('page-stats').classList.toggle('hidden', tab !== 'stats');
                document.getElementById('btn-shelf').className = tab === 'shelf' ? 'pb-3 active-tab' : 'pb-3';
                document.getElementById('btn-stats').className = tab === 'stats' ? 'pb-3 active-tab' : 'pb-3';
                if(tab === 'stats') loadStats();
            }

            async function fetchData() {
                const { data: books } = await _supabase.from('books').select('*');
                const { data: sessions } = await _supabase.from('reading_sessions').select('*');
                const { data: completions } = await _supabase.from('book_completions').select('*');
                
                allBooks = books || [];
                allSessions = sessions || [];
                allCompletions = completions || [];
                
                renderShelf();
            }

            // 渲染書架，包含過濾與排序邏輯
            function renderShelf(filterKeyword = "") {
                const shelf = document.getElementById('book-shelf');
                
                // 1. 計算每本書的最後活動時間（排序用）
                const booksWithLastActive = allBooks.map(book => {
                    const bookSessions = allSessions.filter(s => s.book_id === book.id);
                    // 找出最後一次計時的開始時間，如果沒計時過，就用建立時間
                    const lastActive = bookSessions.length > 0 
                        ? Math.max(...bookSessions.map(s => new Date(s.start_time).getTime()))
                        : new Date(book.created_at).getTime();
                    return { ...book, lastActive };
                });

                // 2. 排序：最後活動時間越晚（數字越大）越靠前
                let sortedBooks = booksWithLastActive.sort((a, b) => b.lastActive - a.lastActive);

                // 3. 過濾搜尋關鍵字
                if (filterKeyword) {
                    sortedBooks = sortedBooks.filter(b => b.title.toLowerCase().includes(filterKeyword.toLowerCase()));
                }

                shelf.innerHTML = sortedBooks.length ? '' : `<p class="text-slate-500 italic py-10 text-center text-sm">${filterKeyword ? '找不到符合的書目' : '書架目前是空的。'}</p>`;
                
                sortedBooks.forEach(book => {
                    const sec = allSessions.filter(s => s.book_id === book.id).reduce((a, b) => a + (b.duration_seconds || 0), 0);
                    const compCount = allCompletions.filter(c => c.book_id === book.id).length;
                    
                    const div = document.createElement('div');
                    div.className = 'glass-card p-5 rounded-3xl flex justify-between items-center cursor-pointer active:bg-slate-800 transition shadow-md relative';
                    div.innerHTML = `
                        <div class="flex-1">
                            <div class="flex justify-between items-start pr-8">
                                <h3 class="font-bold text-lg text-blue-50">${book.title}</h3>
                                ${compCount > 0 ? `<span class="complete-badge">讀完 ${compCount} 次</span>` : ''}
                            </div>
                            <p class="text-slate-500 text-xs mt-1 tracking-wide">累計：<span class="text-blue-400 font-mono font-bold">${formatTime(sec)}</span></p>
                        </div>
                        <div class="bg-slate-800 h-10 w-10 rounded-full flex items-center justify-center text-blue-400 ml-4 font-bold text-xl">→</div>
                    `;
                    div.onclick = () => showDetail(book.id);
                    shelf.appendChild(div);
                });

                // 本月計算
                const now = new Date();
                const startM = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
                const mSec = allSessions.filter(s => s.start_time >= startM).reduce((a, b) => a + (b.duration_seconds || 0), 0);
                document.getElementById('monthly-total').innerText = formatTime(mSec);
            }

            async function addBook() {
                const title = document.getElementById('book-name-input').value.trim();
                if(!title) return;
                
                // 檢查是否已存在
                const exists = allBooks.find(b => b.title === title);
                if (exists) {
                    if (confirm(`書架中已有「${title}」，要直接開啟它嗎？`)) {
                        showDetail(exists.id);
                        return;
                    }
                }

                await _supabase.from('books').insert([{ title }]);
                document.getElementById('book-name-input').value = '';
                await fetchData();
            }

            async function showDetail(id) {
                const book = allBooks.find(b => b.id === id);
                const sessions = allSessions.filter(s => s.book_id === id).sort((a,b) => new Date(b.start_time) - new Date(a.start_time));
                const comps = allCompletions.filter(c => c.book_id === id);
                
                document.getElementById('book-modal').classList.remove('hidden');
                const total = sessions.reduce((a,b) => a + (b.duration_seconds || 0), 0);
                const compCount = comps.length;
                const content = document.getElementById('modal-content');
                
                content.innerHTML = `
                    <div class="text-left relative">
                        <div class="pr-12">
                            <h2 class="text-xl font-bold mb-1 text-white">${book.title}</h2>
                            <p class="text-blue-400 text-sm font-mono mb-6">總時數：${formatTime(total)}</p>
                        </div>
                        <div class="absolute top-0 right-8">
                            ${compCount > 0 ? `<span class="complete-badge">已讀完 ${compCount} 次</span>` : ''}
                        </div>
                        <div class="flex gap-3 mb-8">
                            <button id="timer-ctrl" class="flex-1 bg-blue-600 py-4 rounded-2xl font-bold text-lg shadow-lg">開始閱讀</button>
                            <button id="comp-btn" class="bg-emerald-700 px-5 rounded-2xl font-bold">讀完</button>
                        </div>
                        <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 border-b border-slate-800 pb-1">閱讀紀錄</h4>
                        <div class="space-y-2 max-h-48 overflow-y-auto custom-scrollbar mb-8">
                            ${sessions.length ? sessions.map(s => `
                                <div class="flex justify-between items-center bg-slate-900/50 p-3 rounded-xl border border-slate-800 text-xs">
                                    <span class="text-slate-500">${new Date(s.start_time).toLocaleDateString()} ${new Date(s.start_time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false})}</span>
                                    <div class="flex items-center gap-3">
                                        <span class="font-mono text-blue-300 font-bold">${formatTime(s.duration_seconds)}</span>
                                        <button onclick="window._deleteSession('${s.id}', '${id}')" class="text-red-500 px-2 py-1">刪除</button>
                                    </div>
                                </div>`).join('') : '<p class="text-slate-600 italic text-xs">目前還沒有紀錄</p>'}
                        </div>
                        <button id="delete-book-btn" class="w-full btn-danger py-4 rounded-2xl text-xs font-bold">移除這本書</button>
                    </div>`;

                document.getElementById('timer-ctrl').onclick = () => toggleTimer(id);
                document.getElementById('comp-btn').onclick = () => markComp(id);
                document.getElementById('delete-book-btn').onclick = () => deleteBook(id);
            }

            window._deleteSession = async (sid, bid) => {
                if(!confirm('刪除這筆紀錄？')) return;
                await _supabase.from('reading_sessions').delete().eq('id', sid);
                await fetchData();
                showDetail(bid);
            };

            async function deleteBook(id) {
                if(!confirm('移除整本書？這會刪除所有紀錄。')) return;
                await _supabase.from('books').delete().eq('id', id);
                closeModal();
                await fetchData();
            }

            async function toggleTimer(id) {
                const btn = document.getElementById('timer-ctrl');
                if(!activeTimer) {
                    startTime = new Date();
                    btn.classList.replace('bg-blue-600', 'bg-red-600');
                    activeTimer = setInterval(() => {
                        const s = Math.floor((new Date() - startTime)/1000);
                        btn.innerText = `計時 (${Math.floor(s/60)}m ${s%60}s)`;
                    }, 1000);
                } else {
                    const d = Math.floor((new Date() - startTime)/1000);
                    clearInterval(activeTimer); activeTimer = null;
                    btn.innerText = "儲存中...";
                    await _supabase.from('reading_sessions').insert([{ book_id: id, start_time: startTime.toISOString(), end_time: new Date().toISOString(), duration_seconds: d }]);
                    await fetchData();
                    showDetail(id);
                }
            }

            async function markComp(id) {
                if(confirm('確認已讀完一遍？')) { 
                    await _supabase.from('book_completions').insert([{ book_id: id }]); 
                    await fetchData();
                    showDetail(id);
                }
            }

            function loadStats() {
                const cont = document.getElementById('stats-container');
                const months = {};
                allSessions.forEach(s => {
                    const m = s.start_time.slice(0, 7);
                    months[m] = (months[m] || 0) + (s.duration_seconds || 0);
                });
                cont.innerHTML = Object.keys(months).length ? Object.keys(months).sort().reverse().map(m => `
                    <div class="glass-card p-6 rounded-3xl flex justify-between items-center shadow-lg">
                        <span class="font-bold text-blue-50 text-lg">${m.replace('-',' / ')}</span>
                        <span class="text-blue-400 font-mono text-xl font-bold">${formatTime(months[m])}</span>
                    </div>`).join('') : '<p class="text-center text-slate-500 text-sm">目前還沒有數據。</p>';
            }

            function closeModal() {
                if(activeTimer && !confirm('計時中，確定關閉？')) return;
                if(activeTimer) { clearInterval(activeTimer); activeTimer = null; }
                document.getElementById('book-modal').classList.add('hidden');
            }

            window.onload = init;
        })();
    </script>
</body>
</html>
